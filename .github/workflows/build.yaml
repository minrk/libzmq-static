name: Build

on:
  push:
    branches-ignore:
      - "dependabot/**"
      - "pre-commit-ci-update-config"
    tags:
      - "**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PREFIX: /tmp/zmq
  LIBSODIUM_VERSION: 1.0.21
  LIBZMQ_VERSION: 4.3.5

jobs:
  build:
    container:
      image: ${{ matrix.image }}
    runs-on: ${{ matrix.os || 'ubuntu-22.04' }}
    name: wheel-${{ matrix.name }}

    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-universal
          - name: manylinux_2_28
            arch: x86_64
            image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: setup sccache
        run: |
          if [[ "$(uname)" == "Darwin" ]]; then
            echo "CXX=sccache clang++" >> ${GITHUB_ENV}
            echo "CC=sccache clang" >> ${GITHUB_ENV}
          else
            echo "CXX=sccache g++" >> ${GITHUB_ENV}
            echo "CC=sccache gcc" >> ${GITHUB_ENV}
          fi

      - name: build
        run: |
          bash install_libzmq.sh

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: "/tmp/zmq"
          if-no-files-found: error
  
